<svg width="1500" height="400" viewBox="0 0 1500 400" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A2B78"/>
      <stop offset="50%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#2A0D54"/>
    </linearGradient>

    <!-- Name Gradient -->
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="80%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>

    <!-- Accent -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1500" height="400" fill="url(#bg)"/>

  <!-- Name -->
  <text
    x="750"
    y="150"
    text-anchor="middle"
    fill="url(#nameGrad)"
    font-size="110"
    font-family="Segoe UI, Arial, sans-serif"
    font-weight="700">
    ABINAV N
  </text>

  <!-- Divider -->
  <line x1="300" y1="190" x2="1200" y2="190"
        stroke="#1E3A8A"
        stroke-width="1"/>

  <line x1="700" y1="190" x2="800" y2="190"
        stroke="url(#accent)"
        stroke-width="4"
        stroke-linecap="round"/>

  <!-- Domains -->
  <text
    x="750"
    y="245"
    text-anchor="middle"
    fill="#E5E7EB"
    font-size="28"
    font-family="Segoe UI, Arial, sans-serif"
    letter-spacing="1">

    CYBERSECURITY • ARTIFICIAL INTELLIGENCE • FULL STACK DEVELOPMENT

  </text>

  <!-- Education -->
  <text
    x="750"
    y="320"
    text-anchor="middle"
    fill="#60A5FA"
    font-size="26"
    font-family="Segoe UI, Arial, sans-serif">

    B.TECH CSE (IOT)  |  HONOURS IN CYBERSECURITY

  </text>

</svg>
